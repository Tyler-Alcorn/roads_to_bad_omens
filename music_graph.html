            opacity: 0.8;
            margin: 5px 0;
        }

        .legend {
            margin-top: 10px;
            font-size: 0.8rem;
        }

        .node-label {
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 2px 5px;
            border-radius: 3px;
            font-size: 10px;
            pointer-events: none;
        }
    </style>
